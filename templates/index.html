<!DOCTYPE html>
<html>
<head>
    <title>AI Scam Detector</title>
</head>

<body>

    <h2>AI Based Fake Course & Internship Scam Detection</h2>

    <form method="POST">
        <input type="text" name="message" placeholder="Enter course or internship message" required>
        <button type="submit">Check</button>
    </form>

    {% if prediction %}
    <h3>{{ prediction }}</h3>
{% endif %}

</body>
</html>
